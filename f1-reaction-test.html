<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>F1 Reaction Test - STEM Racing</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
    color: #fff;
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 2.5em;
    margin-bottom: 10px;
    letter-spacing: 3px;
    color: #e10600;
    text-shadow: 0 0 10px rgba(225, 6, 0, 0.5);
  }
  .subtitle {
    text-align: center;
    color: #888;
    margin-bottom: 30px;
    letter-spacing: 2px;
  }
  .lights-container {
    background: #111;
    border: 3px solid #333;
    border-radius: 15px;
    padding: 30px;
    max-width: 900px;
    margin: 0 auto 30px;
    box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
  }
  .lights {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 30px;
  }
  .light-panel {
    background: #000;
    border: 2px solid #444;
    border-radius: 10px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .light {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #2a0000;
    border: 3px solid #1a1a1a;
    transition: all 0.1s;
  }
  .light.on {
    background: #ff0000;
    box-shadow: 0 0 25px #ff0000, 0 0 50px #ff0000, inset 0 0 15px #ff6666;
  }
  .status {
    text-align: center;
    font-size: 1.5em;
    margin: 20px 0;
    min-height: 40px;
    letter-spacing: 1px;
  }
  .status.ready { color: #ffaa00; }
  .status.go { color: #00ff00; font-size: 2em; font-weight: bold; }
  .status.jump { color: #ff0000; }
  .players {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    max-width: 900px;
    margin: 0 auto 30px;
  }
  .player {
    background: #1a1a1a;
    border: 2px solid #333;
    border-radius: 10px;
    padding: 25px;
    text-align: center;
  }
  .player.p1 { border-color: #00a8ff; }
  .player.p2 { border-color: #e10600; }
  .player h2 {
    margin-bottom: 10px;
    font-size: 1.5em;
  }
  .player .key {
    display: inline-block;
    background: #333;
    padding: 5px 15px;
    border-radius: 5px;
    font-family: monospace;
    font-size: 1.2em;
    margin-bottom: 15px;
  }
  .player .time {
    font-size: 2.5em;
    font-weight: bold;
    font-family: monospace;
    min-height: 60px;
  }
  .player.p1 .time { color: #00a8ff; }
  .player.p2 .time { color: #e10600; }
  .controls {
    text-align: center;
    margin-bottom: 30px;
  }
  button {
    background: #e10600;
    color: #fff;
    border: none;
    padding: 15px 40px;
    font-size: 1.2em;
    font-weight: bold;
    letter-spacing: 2px;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.2s;
    margin: 0 10px;
  }
  button:hover:not(:disabled) {
    background: #ff1a0d;
    transform: scale(1.05);
  }
  button:disabled {
    background: #555;
    cursor: not-allowed;
  }
  button.secondary {
    background: #333;
  }
  button.secondary:hover:not(:disabled) {
    background: #555;
  }
  .results {
    max-width: 900px;
    margin: 0 auto;
    background: #1a1a1a;
    border-radius: 10px;
    padding: 25px;
    border: 2px solid #333;
  }
  .results h3 {
    margin-bottom: 15px;
    color: #e10600;
    letter-spacing: 2px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
  }
  th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #333;
  }
  th {
    background: #222;
    color: #888;
    letter-spacing: 1px;
    font-size: 0.9em;
  }
  tbody tr:hover {
    background: #222;
  }
  .winner-p1 { color: #00a8ff; font-weight: bold; }
  .winner-p2 { color: #e10600; font-weight: bold; }
  .tie { color: #ffaa00; font-weight: bold; }
  .jumped { color: #ff4444; font-style: italic; }
  .best-row {
    background: rgba(255, 170, 0, 0.1) !important;
  }
  .no-results {
    text-align: center;
    color: #666;
    padding: 20px;
    font-style: italic;
  }
</style>
</head>
<body>
  <h1>F1 REACTION TEST</h1>
  <div class="subtitle">STEM RACING - LIGHTS OUT AND AWAY WE GO</div>

  <div class="lights-container">
    <div class="lights" id="lights">
      <div class="light-panel"><div class="light"></div><div class="light"></div></div>
      <div class="light-panel"><div class="light"></div><div class="light"></div></div>
      <div class="light-panel"><div class="light"></div><div class="light"></div></div>
      <div class="light-panel"><div class="light"></div><div class="light"></div></div>
      <div class="light-panel"><div class="light"></div><div class="light"></div></div>
    </div>
    <div class="status" id="status">Press START to begin</div>
  </div>

  <div class="players">
    <div class="player p1">
      <h2>Team 1</h2>
      <div class="key">Press Q</div>
      <div class="time" id="time1">--</div>
    </div>
    <div class="player p2">
      <h2>Team 2</h2>
      <div class="key">Press \</div>
      <div class="time" id="time2">--</div>
    </div>
  </div>

  <div class="controls">
    <button id="startBtn">START RACE</button>
    <button id="clearBtn" class="secondary">CLEAR RESULTS</button>
  </div>

  <div class="results">
    <h3>RACE HISTORY</h3>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Team 1 (Q)</th>
          <th>Team 2 (\)</th>
          <th>Winner</th>
          <th>Margin</th>
        </tr>
      </thead>
      <tbody id="resultsBody">
        <tr><td colspan="5" class="no-results">No races yet. Press START to begin.</td></tr>
      </tbody>
    </table>
  </div>

<script>
  const lights = document.querySelectorAll('.light');
  const status = document.getElementById('status');
  const time1El = document.getElementById('time1');
  const time2El = document.getElementById('time2');
  const startBtn = document.getElementById('startBtn');
  const clearBtn = document.getElementById('clearBtn');
  const resultsBody = document.getElementById('resultsBody');

  let state = 'idle'; // idle, sequencing, waiting, go, done
  let startTime = 0;
  let p1Time = null;
  let p2Time = null;
  let p1Jumped = false;
  let p2Jumped = false;
  let timeouts = [];
  let results = [];

  function clearTimeouts() {
    timeouts.forEach(t => clearTimeout(t));
    timeouts = [];
  }

  function setLights(count) {
    lights.forEach((l, i) => {
      if (i < count * 2) l.classList.add('on');
      else l.classList.remove('on');
    });
  }

  function startRace() {
    clearTimeouts();
    state = 'sequencing';
    startBtn.disabled = true;
    p1Time = null;
    p2Time = null;
    p1Jumped = false;
    p2Jumped = false;
    time1El.textContent = '--';
    time2El.textContent = '--';
    time1El.style.color = '';
    time2El.style.color = '';
    setLights(0);
    status.textContent = 'Get ready...';
    status.className = 'status ready';

    // Light up 5 red light pairs, one per second
    for (let i = 1; i <= 5; i++) {
      timeouts.push(setTimeout(() => {
        setLights(i);
        if (i === 5) {
          status.textContent = 'Wait for lights out...';
          state = 'waiting';
          // Random delay between 0.5s and 3s
          const delay = 500 + Math.random() * 2500;
          timeouts.push(setTimeout(lightsOut, delay));
        }
      }, i * 1000));
    }
  }

  function lightsOut() {
    setLights(0);
    startTime = performance.now();
    state = 'go';
    status.textContent = 'GO!';
    status.className = 'status go';
  }

  function handleKey(player) {
    if (state === 'idle' || state === 'done') return;

    if (state === 'sequencing' || state === 'waiting') {
      // Jump start
      if (player === 1 && !p1Jumped && p1Time === null) {
        p1Jumped = true;
        time1El.textContent = 'JUMP!';
        time1El.style.color = '#ff4444';
      } else if (player === 2 && !p2Jumped && p2Time === null) {
        p2Jumped = true;
        time2El.textContent = 'JUMP!';
        time2El.style.color = '#ff4444';
      }
    } else if (state === 'go') {
      const reaction = performance.now() - startTime;
      if (player === 1 && p1Time === null && !p1Jumped) {
        p1Time = reaction;
        time1El.textContent = reaction.toFixed(0) + ' ms';
      } else if (player === 2 && p2Time === null && !p2Jumped) {
        p2Time = reaction;
        time2El.textContent = reaction.toFixed(0) + ' ms';
      }
    }

    // Check if both players done
    const p1Done = p1Jumped || p1Time !== null;
    const p2Done = p2Jumped || p2Time !== null;
    if (p1Done && p2Done) {
      finishRace();
    }
  }

  function finishRace() {
    clearTimeouts();
    state = 'done';
    startBtn.disabled = false;
    startBtn.textContent = 'START RACE';
    setLights(0);

    // Determine winner
    let winner = '';
    let margin = '';
    if (p1Jumped && p2Jumped) {
      winner = 'Both Jumped';
      margin = '-';
    } else if (p1Jumped) {
      winner = 'Team 2';
      margin = 'T1 jumped';
    } else if (p2Jumped) {
      winner = 'Team 1';
      margin = 'T2 jumped';
    } else if (p1Time < p2Time) {
      winner = 'Team 1';
      margin = (p2Time - p1Time).toFixed(0) + ' ms';
    } else if (p2Time < p1Time) {
      winner = 'Team 2';
      margin = (p1Time - p2Time).toFixed(0) + ' ms';
    } else {
      winner = 'Tie';
      margin = '0 ms';
    }

    status.textContent = winner === 'Tie' ? "It's a tie!" :
                         winner.includes('Jumped') ? 'Both jump starts!' :
                         winner + ' wins!';

    results.push({
      t1: p1Jumped ? 'JUMP' : p1Time.toFixed(0) + ' ms',
      t2: p2Jumped ? 'JUMP' : p2Time.toFixed(0) + ' ms',
      winner: winner,
      margin: margin
    });
    renderResults();
  }

  function renderResults() {
    if (results.length === 0) {
      resultsBody.innerHTML = '<tr><td colspan="5" class="no-results">No races yet. Press START to begin.</td></tr>';
      return;
    }

    // Find best valid time for each player
    const validP1 = results.map(r => parseFloat(r.t1)).filter(v => !isNaN(v));
    const validP2 = results.map(r => parseFloat(r.t2)).filter(v => !isNaN(v));
    const bestP1 = validP1.length ? Math.min(...validP1) : null;
    const bestP2 = validP2.length ? Math.min(...validP2) : null;

    resultsBody.innerHTML = results.map((r, i) => {
      let winnerClass = '';
      if (r.winner === 'Team 1') winnerClass = 'winner-p1';
      else if (r.winner === 'Team 2') winnerClass = 'winner-p2';
      else if (r.winner === 'Tie') winnerClass = 'tie';
      else winnerClass = 'jumped';

      const t1Num = parseFloat(r.t1);
      const t2Num = parseFloat(r.t2);
      const t1Display = r.t1 === 'JUMP' ? '<span class="jumped">JUMP START</span>' :
                        (t1Num === bestP1 ? '<strong style="color:#ffaa00">' + r.t1 + ' ★</strong>' : r.t1);
      const t2Display = r.t2 === 'JUMP' ? '<span class="jumped">JUMP START</span>' :
                        (t2Num === bestP2 ? '<strong style="color:#ffaa00">' + r.t2 + ' ★</strong>' : r.t2);

      return `<tr>
        <td>${i + 1}</td>
        <td>${t1Display}</td>
        <td>${t2Display}</td>
        <td class="${winnerClass}">${r.winner}</td>
        <td>${r.margin}</td>
      </tr>`;
    }).reverse().join('');
  }

  document.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    const key = e.key.toLowerCase();
    if (key === 'q') handleKey(1);
    else if (e.key === '\\') handleKey(2);
  });

  startBtn.addEventListener('click', startRace);
  clearBtn.addEventListener('click', () => {
    results = [];
    renderResults();
  });
</script>
</body>
</html>
